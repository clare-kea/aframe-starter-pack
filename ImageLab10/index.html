<!DOCTYPE html>
#CBBD93
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="sky" src="equirectangularBG.jpg">
        <img id="cone" src="coneText.jpg">
        <img id="scoop" src="icecreamText.jpeg">
        <img id="floatie" src="floatie.jpg">
      </a-assets>

      <!--Ice Cream Cone-->
        <a-cone src="#cone" side="double" position="3 0 3" height="-3" radius-bottom=".5"></a-cone>
        <a-sphere src="#scoop" position="3 1.874 3" radius=".7" color="pink"></a-sphere>
      <!--End Ice Cream Cone-->

      <!--Floatie-->
        <a-torus src="floatie.jpg" position="-4.564 0 -1.291" rotation="90 90 0" arc="360" radius="1" radius-tubular="0.2"></a-torus>
      <!--End floatie-->

      <!--Sky-->
        <a-sky src="#sky" radius="30"></a-sky>
    </a-scene>
  </body>
</html>
