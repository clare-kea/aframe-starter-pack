<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
     <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!-- <a-box position="-1 0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box> -->
      <a-sphere position="0 .5 -5" radius="1.5" color="white"></a-sphere>
      <a-sphere position="0 2.2 -5" radius=".95" color="white"></a-sphere>
      <a-sphere position="0 3.4 -5" radius=".6" color="white"></a-sphere>
      <a-cone position="-0.005 3.341 -4.199" radius="0.5" color="orange" rotation="90 90 90" scale=".1 .5 .1"></a-cone>
      <a-sphere position="0.192 3.524 -4.504" radius="0.1" color="black"></a-sphere>
      <a-sphere position="-0.189 3.524 -4.504" radius="0.1" color="black"></a-sphere>
      <!-- <a-cylinder position="1 0.75 -3" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder> -->
      <a-plane position="0 0.1 -4" rotation="-90 0 0" width="4" height="4" color="purple"></a-plane>
      <!-- <a-sky color="#ECECEC"></a-sky> -->
      <!-- the enviroment entity includes a sky. Choose from the presets"none, default, contact, egypt, checkerboard, forest, goaland, yavapai, goldmine, threetowers, poison, arches, tron, japan, dream, volcano, starry, osiris, moon" -->
      <a-entity environment="preset: egypt; dressingAmount: 500"></a-entity>
    </a-scene>
  </body>
</html>
